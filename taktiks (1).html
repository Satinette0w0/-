<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Так-тикс</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f0f0f0;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    grid-template-rows: repeat(5, 60px);
    gap: 4px;
    background: #333;
    padding: 4px;
  }

  .cell {
    width: 60px;
    height: 60px;
    background: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .cell .chip {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #555;
  }

  /* Подсветка строки при наведении на любую клетку в ней */
  .row:hover .cell {
    background: #aad4f5;
  }

  /* Подсветка столбца — трюк с CSS :has() */
  .cell:nth-child(1):hover ~ .cell:nth-child(6),
  .cell:nth-child(6):hover ~ .cell:nth-child(11),
  .cell:nth-child(11):hover ~ .cell:nth-child(16),
  .cell:nth-child(16):hover ~ .cell:nth-child(21) { background: #aad4f5; }

  /* Современный способ — через :has() для подсветки столбца */
  .board:has(.col1:hover) .col1 { background: #aad4f5; }
  .board:has(.col2:hover) .col2 { background: #aad4f5; }
  .board:has(.col3:hover) .col3 { background: #aad4f5; }
  .board:has(.col4:hover) .col4 { background: #aad4f5; }
  .board:has(.col5:hover) .col5 { background: #aad4f5; }

  /* Подсветка конкретной наведённой клетки */
  .cell:hover {
    background: #5aaeea !important;
  }

  .cell:hover .chip {
    background: #222;
  }
</style>
</head>
<body>

<div class="board">
  <!-- Строки обёрнуты в .row для подсветки строки, клетки имеют класс .colN для подсветки столбца -->

  <div class="row" style="display:contents">
    <div class="cell col1"><div class="chip"></div></div>
    <div class="cell col2"><div class="chip"></div></div>
    <div class="cell col3"><div class="chip"></div></div>
    <div class="cell col4"><div class="chip"></div></div>
    <div class="cell col5"><div class="chip"></div></div>
  </div>

  <div class="row" style="display:contents">
    <div class="cell col1"><div class="chip"></div></div>
    <div class="cell col2"><div class="chip"></div></div>
    <div class="cell col3"><div class="chip"></div></div>
    <div class="cell col4"><div class="chip"></div></div>
    <div class="cell col5"><div class="chip"></div></div>
  </div>

  <div class="row" style="display:contents">
    <div class="cell col1"><div class="chip"></div></div>
    <div class="cell col2"><div class="chip"></div></div>
    <div class="cell col3"><div class="chip"></div></div>
    <div class="cell col4"><div class="chip"></div></div>
    <div class="cell col5"><div class="chip"></div></div>
  </div>

  <div class="row" style="display:contents">
    <div class="cell col1"><div class="chip"></div></div>
    <div class="cell col2"><div class="chip"></div></div>
    <div class="cell col3"><div class="chip"></div></div>
    <div class="cell col4"><div class="chip"></div></div>
    <div class="cell col5"><div class="chip"></div></div>
  </div>

  <div class="row" style="display:contents">
    <div class="cell col1"><div class="chip"></div></div>
    <div class="cell col2"><div class="chip"></div></div>
    <div class="cell col3"><div class="chip"></div></div>
    <div class="cell col4"><div class="chip"></div></div>
    <div class="cell col5"><div class="chip"></div></div>
  </div>

</div>

</body>
</html>
